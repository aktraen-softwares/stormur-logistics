services:
  app:
    build: .
    ports:
      - "9007:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stormur
      - POSTGRES_USER=stormur
      - POSTGRES_PASSWORD=stormur_secret_2026
      - DJANGO_SECRET_KEY=django-insecure-st0rmur-l0g1st1cs-k3y-n0t-f0r-pr0d
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=stormur
      - POSTGRES_USER=stormur
      - POSTGRES_PASSWORD=stormur_secret_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stormur -d stormur"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
